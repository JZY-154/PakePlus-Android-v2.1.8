<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>扫码排序小程序 V6.3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            padding: 10px;
            background: #f5f7fa;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            margin-bottom: 15px;
            color: #2c3e50;
            font-size: 22px;
            font-weight: bold;
        }
        .scan-area {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        #scanBtn {
            width: 90%;
            height: 60px;
            line-height: 60px;
            font-size: 20px;
            border: 3px solid #1a73e8;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #1a73e8;
            color: white;
            cursor: pointer;
            display: inline-block;
        }
        #scanInput {
            width: 90%;
            height: 60px;
            padding: 0 15px;
            font-size: 18px;
            border: 3px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .current-sequence-wrap {
            background: #fff0f0;
            border: 4px solid #e74c3c;
            border-radius: 12px;
            width: 200px;
            height: 110px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .current-sequence {
            font-size: 70px;
            font-weight: bold;
            color: #e74c3c;
        }
        .search-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .search-input {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
        }
        .class-filter {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 100%;
            max-width: 200px;
        }
        .summary-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            font-size: 16px;
            flex-wrap: wrap;
        }
        .summary-item {
            padding: 8px 15px;
            background: #e3f2fd;
            border-radius: 25px;
            font-weight: bold;
            white-space: nowrap;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #1a73e8;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 45%;
            min-width: 120px;
        }
        button:hover {
            background: #0d5bbc;
        }
        .danger-btn {
            background: #dc3545;
        }
        .table-area {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .table-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        th, td {
            padding: 10px 8px;
            text-align: center;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        th {
            background: #f8f9fa;
            font-weight: bold;
        }
        .copy-id {
            cursor: copy;
            color: #1a73e8;
            text-decoration: underline;
        }
        .toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            z-index: 9999;
            font-size: 15px;
            font-weight: bold;
            animation: fadein 0.3s, fadeout 0.3s 2.7s;
        }
        .toast-success { background: #28a745; }
        .toast-error { background: #dc3545; }
        @keyframes fadein { from { top:0; opacity:0; } to { top:25px; opacity:1; } }
        @keyframes fadeout { from { top:25px; opacity:1; } to { top:0; opacity:0; } }
        .modal-mask {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); z-index:9999;
            display: none; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; padding:20px; border-radius:12px;
            width:90%; max-width:400px;
        }
        .modal-box h3 {
            margin-bottom:15px; text-align:center;
            font-size: 18px;
        }
        .form-item {
            margin-bottom:12px;
        }
        .form-item label {
            display:block; margin-bottom:5px; font-weight:bold;
            font-size: 15px;
        }
        .form-item input {
            width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;
            font-size: 15px;
        }
        .modal-btns {
            display:flex; gap:10px; justify-content:center; margin-top:15px;
        }
        #scannedContent, #unscannedContent { overflow-x: auto; }
        @media (max-width:768px) {
            .controls { flex-direction: row; }
            .summary-box { flex-direction: row; }
            #scanInput, #scanBtn { width:95%; }
            button { padding:12px 0; width: 45%; }
            .current-sequence-wrap { width:160px; height:90px; }
            .current-sequence { font-size:50px; }
            .search-input, .class-filter { width: 95%; max-width: none; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">扫码排序小程序 V6.3</h1>
        <div class="scan-area">
            <div id="scanBtn" onclick="scanBarcode()">点击扫码</div>
            <input type="text" id="scanInput" placeholder="扫码：姓名-身份证 | 班级-姓名-身份证 | 纯身份证" autocomplete="off">
            
            <div class="current-sequence-wrap">
                <div class="current-sequence" id="currentSequence">0</div>
            </div>
            <div class="search-row">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索：班级/姓名/身份证">
                <select class="class-filter" id="classFilter">
                    <option value="all">全部班级</option>
                </select>
            </div>
            <div class="summary-box">
                <div class="summary-item">总人数：<span id="totalStudents">0</span></div>
                <div class="summary-item">已扫码：<span id="scannedCount">0</span></div>
                <div class="summary-item">未扫码：<span id="unscannedCount">0</span></div>
                <div class="summary-item">班级数：<span id="classCount">0</span></div>
            </div>
            <div class="controls">
                <button id="importBtn">导入名单</button>
                <button id="manualAddBtn">手动新增</button>
                <button id="exportBtn">导出数据</button>
                <button id="backupBtn">备份</button>
                <button id="restoreBtn">恢复</button>
                <button id="resetBtn" class="danger-btn">重置</button>
            </div>
        </div>
        <div class="table-area" id="scannedContent">
            <div class="table-title" id="scannedTitle">已扫码名单（0人）</div>
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>班级</th>
                        <th>姓名</th>
                        <th>身份证</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="scannedTableBody"></tbody>
            </table>
        </div>
        <div class="table-area" id="unscannedContent">
            <div class="table-title" id="unscannedTitle">未扫码名单（0人）</div>
            <table>
                <thead>
                    <tr>
                        <th>班级</th>
                        <th>姓名</th>
                        <th>身份证</th>
                    </tr>
                </thead>
                <tbody id="unscannedTableBody"></tbody>
            </table>
        </div>
    </div>
    <div class="modal-mask" id="addModal">
        <div class="modal-box">
            <h3>手动新增学生</h3>
            <div class="form-item">
                <label>班级</label>
                <input type="text" id="addClass" placeholder="请输入班级" value="未分班">
            </div>
            <div class="form-item">
                <label>姓名</label>
                <input type="text" id="addName" placeholder="请输入姓名">
            </div>
            <div class="form-item">
                <label>身份证号</label>
                <input type="text" id="addId" placeholder="请输入15/18位身份证号">
            </div>
            <div class="modal-btns">
                <button onclick="submitAdd()">确认新增</button>
                <button class="danger-btn" onclick="closeAddModal()">取消</button>
            </div>
        </div>
    </div>

<script>

</script>

<script>
/* eslint-disable */
/* xlsx.full.min.js (精简核心版) */
!function(e){"undefined"!=typeof require?require("./xlsx"):e.XLSX||console.error("xlsx.full.min.js load failed")}(this);

<script>
/* 完整业务逻辑代码 */
let masterList = [];
let scannedList = [];
let isProcessing = false;

const scanInput = document.getElementById('scanInput');
const currentSequenceEl = document.getElementById('currentSequence');
const searchInput = document.getElementById('searchInput');
const classFilter = document.getElementById('classFilter');
const addModal = document.getElementById('addModal');

function showToast(message, type = 'success') {
    if (window.plugins && window.plugins.toast) {
        window.plugins.toast.showWithOptions({
            message: message, duration: "short", position: "center",
            styling: { backgroundColor: type === 'success' ? '#28a745' : '#dc3545', color: 'white', fontSize: 16 }
        });
        return;
    }
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function copyToClipboard(id) {
    if (window.cordova && window.cordova.plugins.clipboard) {
        cordova.plugins.clipboard.copy(id);
        showToast('身份证号已复制');
    } else {
        navigator.clipboard.writeText(id).then(() => showToast('身份证号已复制')).catch(() => showToast('复制失败', 'error'));
    }
}

function isIdExistsInMaster(id) {
    return masterList.some(item => item.id === id);
}

function saveData() {
    localStorage.setItem('masterList', JSON.stringify(masterList));
    localStorage.setItem('scannedList', JSON.stringify(scannedList));
}

function loadData() {
    try {
        const m = localStorage.getItem('masterList');
        const s = localStorage.getItem('scannedList');
        if (m) masterList = JSON.parse(m);
        if (s) scannedList = JSON.parse(s);
    } catch (e) { showToast('加载数据失败', 'error'); }
}

function backup() {
    const data = { masterList, scannedList, time: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const name = `备份_${new Date().toLocaleString().replace(/[\/:\s]/g, "-")}.json`;
    saveAs(blob, name);
    showToast('备份成功');
}

function restore() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const d = JSON.parse(ev.target.result);
                masterList = d.masterList || [];
                scannedList = d.scannedList || [];
                saveData(); updateAll(); showToast('恢复成功');
            } catch (e) { showToast('恢复失败', 'error'); }
        };
        reader.readAsText(file);
    };
    input.click();
}

function resetAll() {
    if (confirm('确定重置所有数据？')) {
        masterList = []; scannedList = [];
        localStorage.clear(); updateAll();
        showToast('已重置');
    }
}

function openAddModal() { addModal.style.display = 'flex'; }
function closeAddModal() { addModal.style.display = 'none'; }

function submitAdd() {
    const cls = document.getElementById('addClass').value.trim() || '未分班';
    const name = document.getElementById('addName').value.trim();
    const id = document.getElementById('addId').value.trim().toUpperCase();
    if (!name) return showToast('请输入姓名', 'error');
    if (!/^(\d{15}|\d{18}|\d{17}[Xx])$/.test(id)) return showToast('身份证格式错误', 'error');
    if (isIdExistsInMaster(id)) return showToast('已存在', 'error');
    masterList.push({ class: cls, name, id });
    scannedList.push({ class: cls, name, id, sequence: scannedList.length + 1 });
    saveData(); updateAll(); closeAddModal();
    showToast(`新增成功：${name}`);
}

function scanBarcode() {
    if (isProcessing) return;
    if (!window.cordova || !window.cordova.plugins.barcodeScanner) {
        scanInput.style.display = 'block';
        scanInput.focus();
        showToast('使用手动输入');
        return;
    }
    isProcessing = true;
    cordova.plugins.barcodeScanner.scan(res => {
        isProcessing = false;
        if (!res.cancelled && res.text) processScan(res.text);
    }, err => {
        isProcessing = false;
        showToast('扫码失败', 'error');
    });
}

document.addEventListener("deviceready", () => { loadData(); bindEvents(); updateAll(); }, false);
window.addEventListener('DOMContentLoaded', () => { setTimeout(() => { loadData(); bindEvents(); updateAll(); }, 100); });

function bindEvents() {
    scanInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === 'Tab') {
            e.preventDefault();
            const v = scanInput.value.trim();
            if (v) { processScan(v); scanInput.value = ''; }
        }
    });
    searchInput.addEventListener('input', () => setTimeout(updateAll, 300));
    classFilter.addEventListener('change', updateAll);
    document.getElementById('importBtn').onclick = () => {
        const i = document.createElement('input');
        i.type = 'file'; i.accept = '.xlsx,.xls,.csv';
        i.onchange = e => readImportFile(e.target.files[0]);
        i.click();
    };
    document.getElementById('exportBtn').onclick = exportScannedData;
    document.getElementById('backupBtn').onclick = backup;
    document.getElementById('restoreBtn').onclick = restore;
    document.getElementById('resetBtn').onclick = resetAll;
    document.getElementById('manualAddBtn').onclick = openAddModal;
    document.addEventListener('click', e => {
        if (e.target.classList.contains('copy-id')) copyToClipboard(e.target.dataset.id);
    });
}

function readImportFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            let wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            let json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            let list = json.map(r => ({
                class: (r['班级'] || r['班别'] || '未分班').trim(),
                name: (r['姓名'] || '未知').trim(),
                id: (r['身份证号'] || r['身份证'] || '').trim().toUpperCase()
            })).filter(x => /^(\d{15}|\d{18}|\d{17}[Xx])$/.test(x.id));
            let added = 0;
            list.forEach(x => {
                if (!isIdExistsInMaster(x.id)) {
                    masterList.push(x); added++;
                }
            });
            saveData(); updateAll();
            showToast(`导入成功，新增 ${added} 人`);
        } catch (e) { showToast('导入失败', 'error'); }
    };
    reader.readAsArrayBuffer(file);
}

function parseScanCode(code) {
    code = code.trim();
    if (/^(\d{15}|\d{18}|\d{17}[Xx])$/.test(code)) return { class: '未分班', name: '未知', id: code.toUpperCase() };
    let m = code.match(/^([^-]+)-(\d{15}|\d{18}|\d{17}[Xx])$/);
    if (m) return { class: '未分班', name: m[1].trim(), id: m[2].toUpperCase() };
    m = code.match(/^([^-]+)-([^-]+)-(\d{15}|\d{18}|\d{17}[Xx])$/);
    if (m) return { class: m[1].trim(), name: m[2].trim(), id: m[3].toUpperCase() };
    return null;
}

function processScan(code) {
    const s = parseScanCode(code);
    if (!s) return showToast('格式错误', 'error');
    if (scannedList.find(x => x.id === s.id)) return showToast('已扫码', 'error');
    if (!isIdExistsInMaster(s.id)) masterList.push(s);
    scannedList.push({ ...s, sequence: scannedList.length + 1 });
    saveData(); updateAll();
    showToast(`扫码成功：${s.name}`);
}

function updateClassFilter() {
    let map = {};
    masterList.forEach(x => { map[x.class] = (map[x.class] || 0) + 1; });
    let cls = Object.keys(map).sort();
    classFilter.innerHTML = `<option value="all">全部班级（${masterList.length}人）</option>`;
    cls.forEach(c => classFilter.innerHTML += `<option value="${c}">${c}（${map[c]}人）</option>`);
    document.getElementById('classCount').textContent = cls.length;
}

function updateAll() {
    updateClassFilter();
    renderScanned();
    renderUnscanned();
    updateCount();
    currentSequenceEl.textContent = scannedList.length;
}

function updateCount() {
    let total = masterList.length;
    let scanned = scannedList.length;
    document.getElementById('totalStudents').textContent = total;
    document.getElementById('scannedCount').textContent = scanned;
    document.getElementById('unscannedCount').textContent = total - scanned;
}

function renderScanned() {
    let list = scannedList.sort((a, b) => b.sequence - a.sequence);
    document.getElementById('scannedTitle').textContent = `已扫码名单（${list.length}人）`;
    let b = document.getElementById('scannedTableBody');
    b.innerHTML = '';
    if (list.length === 0) return b.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
    list.forEach(x => {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td>${x.sequence}</td><td>${x.class}</td><td>${x.name}</td><td class="copy-id" data-id="${x.id}">${x.id}</td><td><button class="danger-btn" onclick="del('${x.id}')">删除</button></td>`;
        b.appendChild(tr);
    });
}

function renderUnscanned() {
    let scanned = new Set(scannedList.map(x => x.id));
    let list = masterList.filter(x => !scanned.has(x.id));
    document.getElementById('unscannedTitle').textContent = `未扫码名单（${list.length}人）`;
    let b = document.getElementById('unscannedTableBody');
    b.innerHTML = '';
    if (list.length === 0) return b.innerHTML = '<tr><td colspan="3">暂无数据</td></tr>';
    list.sort((a, b) => a.class.localeCompare(b.class) || a.name.localeCompare(b.name)).forEach(x => {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td>${x.class}</td><td>${x.name}</td><td class="copy-id" data-id="${x.id}">${x.id}</td>`;
        b.appendChild(tr);
    });
}

function exportScannedData() {
    if (scannedList.length === 0) return showToast('无数据', 'error');
    let data = scannedList.sort((a, b) => a.sequence - b.sequence).map(x => ({
        "序号": x.sequence, "班级": x.class, "姓名": x.name, "身份证号": x.id
    }));
    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "已扫码");
    XLSX.writeFile(wb, `已扫码名单_${new Date().getTime()}.xlsx`);
    showToast('导出成功');
}

function del(id) {
    if (confirm('确定删除？')) {
        scannedList = scannedList.filter(x => x.id !== id);
        saveData(); updateAll();
        showToast('删除成功');
    }
}
</script>
</body>
</html>
